frontend:
  name: fe-globaly-os
  replicaCount: 1

  image:
    repository: 834033184010.dkr.ecr.ap-southeast-2.amazonaws.com/globalyos-frontend
    tag: globalyos-frontend-05-21-00d55cb
    pullPolicy: IfNotPresent

  imagePullSecrets:
    enabled: false
    name: ecr-registry-secret

  securityContext:
    enabled: false
    runAsUser: 0       # UID the container process runs as
    runAsGroup: 0      # Primary GID of the container process
    supplementalGroupsAndFsGroup:
      enabled: false
      supplementalGroups: [4000]
      fsGroup: 2000
      
  tolerations:
    enabled: true                  
    unreachableSeconds: 60         
    notReadySeconds: 60    

  workdir:
    enabled: true
    path: /globalyos/frontend

  startupCommand:
    enabled: true
    shell: /bin/sh
    command: |
      echo "-------------------------------"
      echo "k8s => restarting nginx"
      echo "-------------------------------"
      sudo service nginx start
      #nginx -g daemon off
      tail -f /dev/null
      

  resources:
    requests:
      memory: "100Mi"
    limits:
      memory: "100Mi"

  volumes:
    defaultpvc:
      enabled: false
      volumeName: "logs-storage"
      pvcName: "pvc-agentcis-v2"
      containerMountPath: "/var/log/nginx/"
      subPath:
        enabled: false      
        hostSubPath: "agentcis-v2-crm-frontend/"

  affinity:
    enabled: false
    preferredNodes:
      - hostname: agentcis-staging-k8s-master-172-34-28-189
        weight: 100
      - hostname: other-server
        weight: 50

  multiplePorts:
    enabled: false
    ports:
      - port: 50051
        name: grpc
        
  livenessProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  startupProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  service:
    enabled: true
    type: NodePort
    containerport: 80
    svcport: 80    
    multiplePorts:
      enabled: false
      ports:
        - name: grpc
          port: 50051
          targetPort: 50051
          
  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    cpuUtilization: 50
    scaleUp:
      podsValue: 2
    scaleDown:
      podsValue: 1

  ingress:
    enabled: false
    clusterIssuer: lets-encrypt
    className: nginx
    host: subash.globalyhub.com
    path: /
    
  httproute:
    enabled: false
    gateway:
      name: "globalyos-stage-alb-gateway"
      namespace: "gateways-globalyos"
      sectionName: "https"
    customHostname:
      enabled: false
      hosts:
        - "staging.globalyos.com"        
    httpMultipleRoute:
      paths:
        - /
    urlRewriteEnabled: false

  targetGroupConfiguration:
    enabled: false
    targetType: "instance"
    nodeSelector:
      enabled: false
      labelName: type
      labelValue: default-server-worker      
    healthCheckPath: "/nginx-health"
    healthCheckProtocol: "HTTP"
    #healthCheckPort: "80"
    healthCheckInterval: 30
    healthCheckTimeout: 4      # ← ADD THIS LINE
    healthyThresholdCount: 2
    unhealthyThresholdCount: 2
    matcher:
      httpCode: "200-399,401-404"