frontend:
  name: production-fe-globaly-app
  replicaCount: 1

  image:
    repository: 834033184010.dkr.ecr.ap-south-1.amazonaws.com/globalyapp-frontend
    tag: globalyapp-frontend-07-01-ef13688
    pullPolicy: IfNotPresent

  imagePullSecrets:
    enabled: false
    name: ecr-registry-secret

  securityContext:
    enabled: true
    runAsUser: 0       # UID the container process runs as
    runAsGroup: 0      # Primary GID of the container process
    supplementalGroupsAndFsGroup:
      enabled: false
      supplementalGroups: [4000]
      fsGroup: 2000
      
  tolerations:
    enabled: true                  
    unreachableSeconds: 60         
    notReadySeconds: 60    

  workdir:
    enabled: true
    path: /globalyapp/frontend

  startupCommand:
    enabled: true
    shell: /bin/sh
    command: |
      echo "-------------------------------"
      echo "k8s => restarting nginx"
      echo "-------------------------------"
      sudo service nginx start
      #nginx -g daemon off
      tail -f /dev/null
      

  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "300Mi"
      cpu: "300m"

  volumes:
    defaultpvc:
      enabled: false
      volumeName: "logs-storage"
      pvcName: "pvc-agentcis-v2"
      containerMountPath: "/var/log/nginx/"
      subPath:
        enabled: false      
        hostSubPath: "agentcis-v2-crm-frontend/"

  affinity:
    enabled: true
    preventpolicy:
      enabled: true
      key: type
      values:
        - cache-server-worker
    preferredNodes:
      - weight: 100
        key: type
        values:
          - web-server-worker

  multiplePorts:
    enabled: false
    ports:
      - port: 50051
        name: grpc
        
  livenessProbe:
    enabled: true
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  readinessProbe:
    enabled: true
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3

  startupProbe:
    enabled: true
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 10

  service:
    enabled: true
    type: NodePort
    containerport: 80
    svcport: 80    
    multiplePorts:
      enabled: false
      ports:
        - name: grpc
          port: 50051
          targetPort: 50051
          
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    cpuUtilization: 50
    scaleUp:
      podsValue: 2
    scaleDown:
      podsValue: 1

  ingress:
    enabled: true
    clusterIssuer: lets-encrypt-staging
    className: nginx
    tlsEnabled: false
    host: staging.globalyapp.com
    path: /
    
  httproute:
    enabled: false
    gateway:
      name: "globalyapp-stage-alb-gateway"
      namespace: "gateways-globalyapp"
      sectionName: "https"
    customHostname:
      enabled: false
      hosts:
        - "staging.globalyapp.com"        
    httpMultipleRoute:
      paths:
        - /
    urlRewriteEnabled: false

  targetGroupConfiguration:
    enabled: false
    targetType: "instance"
    nodeSelector:
      enabled: false
      labelName: type
      labelValue: default-server-worker      
    healthCheckPath: "/nginx-health"
    healthCheckProtocol: "HTTP"
    #healthCheckPort: "80"
    healthCheckInterval: 30
    healthCheckTimeout: 4      # ← ADD THIS LINE
    healthyThresholdCount: 2
    unhealthyThresholdCount: 2
    matcher:
      httpCode: "200-399,401-404"