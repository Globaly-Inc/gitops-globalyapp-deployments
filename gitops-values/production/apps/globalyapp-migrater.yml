backend:
  name: production-api-migrater-globaly-app
  replicaCount: 1

  image:
    repository: 834033184010.dkr.ecr.ap-south-1.amazonaws.com/production-globalyapp-migrater
    tag: globalyapp-migrater-07-01-33d5b71
    pullPolicy: IfNotPresent

  imagePullSecrets:
    enabled: false
    name: ecr-registry-secret

  securityContext:
    enabled: true
    runAsUser: 0       # UID the container process runs as
    runAsGroup: 0      # Primary GID of the container process
    supplementalGroupsAndFsGroup:
      enabled: false
      supplementalGroups: [4000]
      fsGroup: 2000

  tolerations:
    enabled: true                  
    unreachableSeconds: 60         
    notReadySeconds: 60   

  workdir:
    enabled: true
    path: /globalyapp/migrater/

  startupCommand:
    enabled: true
    shell: /bin/sh
    command: |
      echo "-------------------------------"
      echo "k8s => restarting nginx"
      echo "-------------------------------"
      tail -f /dev/null

  resources:
    requests:
      memory: "200Mi"
    limits:
      memory: "1500Mi"
  multiplePorts:
    enabled: false
    ports:
      - port: 9000
        name: http
  livenessProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 20
    periodSeconds: 60
    failureThreshold: 3
  readinessProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 60
    failureThreshold: 3
  startupProbe:
    enabled: false
    httpGet:
      path: /nginx-health
      port: 80
    initialDelaySeconds: 15
    periodSeconds: 60
    failureThreshold: 3
  volumes:
    defaultpvc:
      enabled: false
      volumeName: "logs-storage"
      pvcName: "pvc-microservice-agent-portal"
      containerMountPath: "/agent-portal/backend/storage/logs/"
      subPath:
        enabled: false      
        hostSubPath: "agent-portal-api/"

  affinity:
    enabled: true
    preventpolicy:
      enabled: true
      key: type
      values:
        - cache-server-worker
    preferredNodes:
      - weight: 100
        key: type
        values:
          - web-server-worker

  service:
    enabled: false
    type: NodePort
    containerport: 80
    svcport: 29000

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    cpuUtilization: 50
    scaleUp:
      podsValue: 2
    scaleDown:
      podsValue: 1

  ingress:
    enabled: false
    clusterIssuer: lets-encrypt
    className: nginx
    host: subash.globalyhub.com
    path: /
  httproute:
    enabled: false
    gateway:
      name: "globalyapp-stage-alb-gateway"
      namespace: "gateways-globalyapp"
      sectionName: "https"
    customHostname:
      enabled: false
      hosts:
        - "api.staging.globalyapp.com"       
    httpMultipleRoute:
      paths:
        - /
    urlRewriteEnabled: false
  targetGroupConfiguration:
    enabled: false
    targetType: "instance"
    nodeSelector:
      enabled: false
      labelName: type
      labelValue: default-server-worker      
    healthCheckPath: "/nginx-health"
    healthCheckProtocol: "HTTP"
    healthCheckPort: "80"
    healthCheckInterval: 30
    healthCheckTimeout: 4
    healthyThresholdCount: 2
    unhealthyThresholdCount: 2
    matcher:
      httpCode: "200-399,401-404"
    